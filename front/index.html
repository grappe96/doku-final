<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐳 도쿠 Todo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 36px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 24px;
      color: #1a202c;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #a0aec0;
      margin-bottom: 28px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #4299e1; }

    button.add-btn {
      padding: 10px 18px;
      background: #4299e1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.add-btn:hover { background: #3182ce; }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 8px;
      background: #f7fafc;
      border: 1.5px solid #e2e8f0;
      transition: background 0.2s;
    }

    li.done { background: #ebf8ff; border-color: #bee3f8; }

    li .text {
      font-size: 15px;
      color: #2d3748;
      cursor: pointer;
      flex: 1;
    }

    li.done .text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    button.del-btn {
      background: none;
      border: none;
      color: #fc8181;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 14px;
      padding: 24px 0;
    }

    .error {
      color: #fc8181;
      font-size: 13px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐳 도쿠 Todo</h1>
    <p class="subtitle" id="subtitle">백엔드 연결 중...</p>
    <p class="error" id="error"></p>
    <div class="input-row">
      <input type="text" id="todoInput" placeholder="할 일을 입력하세요" />
      <button class="add-btn" onclick="addTodo()">추가</button>
    </div>
    <ul id="todoList"></ul>
    <p class="empty" id="empty" style="display:none">할 일이 없어요! 추가해보세요 🎉</p>
  </div>

  <script>
    const API = '/api';

    async function fetchTodos() {
      try {
        const res = await fetch(`${API}/todos`);
        const todos = await res.json();
        render(todos);
        document.getElementById('subtitle').textContent = '백엔드 연결 완료 ✅';
        document.getElementById('error').textContent = '';
      } catch (e) {
        document.getElementById('subtitle').textContent = '백엔드 연결 실패 ❌';
        document.getElementById('error').textContent = '백엔드 서버에 연결할 수 없어요.';
      }
    }

    async function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;
      await fetch(`${API}/todos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      input.value = '';
      fetchTodos();
    }

    async function toggleTodo(id) {
      await fetch(`${API}/todos/${id}/toggle`, { method: 'PATCH' });
      fetchTodos();
    }

    async function deleteTodo(id) {
      await fetch(`${API}/todos/${id}`, { method: 'DELETE' });
      fetchTodos();
    }

    function render(todos) {
      const ul = document.getElementById('todoList');
      const empty = document.getElementById('empty');
      ul.innerHTML = '';
      if (todos.length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      todos.forEach(todo => {
        const li = document.createElement('li');
        if (todo.done) li.classList.add('done');
        li.innerHTML = `
          <span class="text" onclick="toggleTodo(${todo.id})">${todo.text}</span>
          <button class="del-btn" onclick="deleteTodo(${todo.id})">✕</button>
        `;
        ul.appendChild(li);
      });
    }

    document.getElementById('todoInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    fetchTodos();
  </script>
</body>
</html>
